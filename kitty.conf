# ═══════════════════════════════════════════
# KITTY - KDE Wayland Glass Setup
# ThinkPad L13 (Intel UHD)
# ═══════════════════════════════════════════

# ── Police ──────────────────────────────────
font_family JetBrainsMono Nerd Font
font_size 11.5

# ── Transparence & Blur ─────────────────────
background_opacity 0.80
background_blur 40
background_tint 0.92
dynamic_background_opacity yes

# ── Fenêtre ─────────────────────────────────
window_padding_width 12
hide_window_decorations yes
placement_strategy center

# ── Tabs ────────────────────────────────────
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# ── Curseur ─────────────────────────────────
cursor_shape beam
cursor_beam_thickness 1.6

# ── Scroll ──────────────────────────────────
scrollback_lines 8000

# ── Perf Intel UHD ──────────────
sync_to_monitor yes
repaint_delay 10

# réduit micro stutter
input_delay 3

# ── Shell ───────────────────────────────────
shell /bin/zsh
shell_integration enabled

# ── Catppuccin Mocha ────────────────────────
foreground #cdd6f4
background #1e1e2e

color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8
